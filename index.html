<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הכנסות והוצאות">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הכנסות והוצאות</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', 'Arial Hebrew', Arial, sans-serif; background: #f0fdf4; min-height: 100vh; direction: rtl; font-size: 16px; }

/* ---- HEADER ---- */
.header { background: linear-gradient(135deg, #14532d 0%, #16a34a 100%); padding: 18px 16px 14px; color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
.header-inner { max-width: 700px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.header-left { display: flex; flex-direction: column; }
.header h1 { font-size: 22px; font-weight: 700; }
.header-sub { font-size: 13px; opacity: 0.8; margin-top: 2px; }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.btn-sync { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 10px; padding: 9px 14px; font-weight: 600; font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-sync:hover { background: rgba(255,255,255,0.3); }
.btn-add-main { background: white; color: #14532d; border: none; border-radius: 10px; padding: 9px 16px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-add-main:hover { background: #dcfce7; }

/* ---- SUMMARY BAR ---- */
.summary { max-width: 700px; margin: 10px auto 0; padding: 0 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.summary-card { background: white; border-radius: 12px; padding: 10px 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); text-align: center; }
.summary-card .label { font-size: 14px; color: #374151; margin-bottom: 4px; font-weight: 700; }
.summary-card .amount { font-size: 18px; font-weight: 700; }
.card-income .amount { color: #16a34a; }
.card-expense .amount { color: #dc2626; }
.card-balance { background: linear-gradient(135deg, #1e3a5f, #1d4ed8); }
.card-balance .label { color: rgba(255,255,255,0.9); }
.card-balance .amount { color: white; font-size: 16px; }
.card-bank { cursor: pointer; border: 2px dashed #d1d5db; }
.card-bank:hover { border-color: #6366f1; }
.card-bank input { width: 100%; border: none; text-align: center; font-size: 16px; font-weight: 700; color: #6366f1; font-family: inherit; outline: none; background: transparent; }
.card-bank .hint { font-size: 12px; color: #6b7280; margin-top: 2px; font-weight: 600; }

/* ---- TABS ---- */
.main { max-width: 700px; margin: 0 auto; padding: 12px 12px 80px; }
.tabs { display: flex; gap: 6px; margin-bottom: 14px; background: white; border-radius: 14px; padding: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.tab { flex: 1; padding: 10px; border: none; border-radius: 10px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: transparent; color: #6b7280; }
.tab.active.income-tab { background: #16a34a; color: white; }
.tab.active.expense-tab { background: #dc2626; color: white; }
.tab:not(.active):hover { background: #f3f4f6; color: #374151; }

/* ---- FILTER BAR ---- */
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.filter-bar select, .filter-bar input[type="text"] { border: 1.5px solid #d1fae5; border-radius: 10px; padding: 9px 12px; font-family: inherit; font-size: 15px; background: white; color: #111827; flex: 1; min-width: 100px; }
.filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: #16a34a; }

/* ---- SELECTION BAR ---- */
.selection-bar { display: none; background: #111827; color: white; border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; position: sticky; bottom: 0; z-index: 100; }
.selection-bar.show { display: flex; }
.selection-bar .sel-count { font-size: 14px; font-weight: 600; opacity: 0.85; }
.selection-bar .sel-sum { font-size: 19px; font-weight: 700; }
.selection-bar button { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; padding: 6px 12px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }

/* ---- ENTRIES LIST (טבלאי) ---- */
.entries { display: flex; flex-direction: column; gap: 4px; background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; padding: 4px; }
.entries-header { display: grid; grid-template-columns: 26px 1fr 78px 78px 92px; gap: 8px; padding: 8px 12px; font-size: 12px; font-weight: 700; color: #6b7280; background: white; border-radius: 12px 12px 0 0; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: -1px; }
.entries-header span:nth-child(3), .entries-header span:nth-child(4), .entries-header span:nth-child(5) { text-align: center; }
.entry-row { border-radius: 10px; border-right: 4px solid transparent; cursor: pointer; transition: background 0.15s; padding: 8px 10px; }
.entry-row:hover { background: #f9fafb; }
.entry-row.income { border-right-color: #16a34a; }
.entry-row.expense { border-right-color: #dc2626; }
.entry-row.is-paid { opacity: 0.6; }
.entry-row + .entry-row { border-top: 1px solid #f1f5f9; }
.entry-main { display: grid; grid-template-columns: 26px 1fr 78px 78px 92px; gap: 8px; align-items: center; }
.entry-check { width: 22px; height: 22px; cursor: pointer; accent-color: #16a34a; }
.entry-name { font-size: 17px; font-weight: 400; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-row:not(.is-paid) .entry-name { font-weight: 700; }
.entry-col-date { font-size: 13px; color: #374151; text-align: center; white-space: nowrap; }
.entry-amount { font-size: 18px; font-weight: 400; white-space: nowrap; text-align: left; }
.entry-row:not(.is-paid) .entry-amount { font-weight: 700; }
.entry-row.income .entry-amount { color: #16a34a; }
.entry-row.expense .entry-amount { color: #dc2626; }
.entry-sub { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 6px; padding-right: 34px; }
.entry-notes { font-size: 14px; color: #6b7280; font-weight: 500; }
.badge { font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 99px; }
.badge-paid { background: #dcfce7; color: #15803d; }
.badge-unpaid { background: #fee2e2; color: #dc2626; }
.badge-partial { background: #fef3c7; color: #b45309; }
@media (max-width: 480px) {
  .entries-header, .entry-main { grid-template-columns: 22px 1fr 64px 64px 78px; gap: 5px; }
  .entry-name { font-size: 16px; }
  .entry-amount { font-size: 16px; }
  .entry-col-date { font-size: 12px; }
}

.empty-state { text-align: center; padding: 40px 20px; color: #9ca3af; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 16px; }

/* ---- MODAL ---- */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 20px 20px 40px; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 20px; font-weight: 700; color: #111827; }
.btn-close { background: #f3f4f6; border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-close:hover { background: #e5e7eb; }

/* ---- FORM ---- */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
.form-input { width: 100%; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 11px 14px; font-family: inherit; font-size: 15px; color: #111827; background: white; transition: border-color 0.15s; }
.form-input:focus { outline: none; border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.12); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-select { width: 100%; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 11px 14px; font-family: inherit; font-size: 15px; color: #111827; background: white; cursor: pointer; }
.form-select:focus { outline: none; border-color: #16a34a; }
.form-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-save { flex: 1; background: #16a34a; color: white; border: none; border-radius: 12px; padding: 14px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; }
.btn-save:hover { background: #15803d; }
.btn-delete { background: #fee2e2; color: #dc2626; border: none; border-radius: 12px; padding: 14px 18px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-delete:hover { background: #fecaca; }

/* ---- TYPE TOGGLE ---- */
.type-toggle { display: flex; gap: 0; border: 1.5px solid #d1d5db; border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
.type-btn { flex: 1; padding: 10px; border: none; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; background: white; color: #6b7280; transition: all 0.15s; }
.type-btn.active-income { background: #16a34a; color: white; }
.type-btn.active-expense { background: #dc2626; color: white; }

/* ---- MULTI-AMOUNT ---- */
.amounts-box { border: 1.5px solid #d1d5db; border-radius: 10px; padding: 10px 12px; background: white; }
.amounts-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.amount-row { display: flex; align-items: center; gap: 8px; }
.amount-row input { flex: 1; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 7px 10px; font-family: inherit; font-size: 14px; color: #111827; background: #f9fafb; }
.amount-row input:focus { outline: none; border-color: #16a34a; background: white; }
.amount-row .note-inp { flex: 1.5; font-size: 13px; color: #6b7280; }
.btn-remove-amt { background: #fee2e2; border: none; border-radius: 6px; width: 28px; height: 28px; color: #dc2626; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-add-amt { width: 100%; border: 1.5px dashed #d1d5db; border-radius: 8px; padding: 7px; background: transparent; color: #6b7280; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-add-amt:hover { border-color: #16a34a; color: #16a34a; }
.amounts-total { font-size: 14px; font-weight: 700; color: #374151; margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb; text-align: left; }
.sub-amounts-display { font-size: 12px; color: #6b7280; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
.sub-amt-chip { background: #fef3c7; color: #92400e; border-radius: 99px; padding: 2px 8px; font-size: 11px; font-weight: 600; }

/* ---- QUICK EDIT ---- */
.quick-edit { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f3f4f6; align-items: center; }
.qe-select { flex: 1; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 7px 10px; font-family: inherit; font-size: 13px; font-weight: 600; color: #374151; background: #f9fafb; cursor: pointer; }
.qe-select:focus { outline: none; border-color: #dc2626; }
.qe-date { border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 7px 10px; font-family: inherit; font-size: 13px; color: #374151; background: #f9fafb; width: 140px; }
.qe-date:focus { outline: none; border-color: #dc2626; }

/* ---- STATUS MESSAGE ---- */
.sync-status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; color: white; padding: 10px 20px; border-radius: 99px; font-size: 14px; font-weight: 600; z-index: 300; display: none; white-space: nowrap; }
.sync-status.show { display: block; animation: fadeIn 0.2s; }
.sync-status.success { background: #15803d; }
.sync-status.error { background: #dc2626; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ---- FAB ---- */
.fab { position: fixed; bottom: 24px; left: 24px; width: 56px; height: 56px; border-radius: 50%; background: #16a34a; color: white; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 14px rgba(22,163,74,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.fab:hover { background: #15803d; transform: scale(1.05); }

@media (min-width: 500px) {
  .modal-overlay { align-items: center; padding: 20px; }
  .modal { border-radius: 20px; max-height: 80vh; }
  .fab { display: none; }
}
</style>
</head>
<body>

<!-- GITHUB SETUP SCREEN -->
<div id="ghSetup" style="display:none; position:fixed; inset:0; background:linear-gradient(135deg,#1e3a5f,#1d4ed8); z-index:998; align-items:center; justify-content:center; flex-direction:column; gap:16px;">
  <div style="font-size:40px;">☁️</div>
  <div style="color:white; font-size:20px; font-weight:700;">הגדרת סנכרון</div>
  <div style="background:white; border-radius:20px; padding:28px 32px; width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="font-size:14px; color:#374151; margin-bottom:6px; font-weight:600;">GitHub Personal Access Token</div>
    <div style="font-size:12px; color:#6b7280; margin-bottom:14px;">יוזן פעם אחת ויישמר במכשיר שלך</div>
    <input id="ghTokenInput" type="password" autocomplete="off" placeholder="ghp_..."
      style="width:100%; border:2px solid #d1d5db; border-radius:10px; padding:12px; font-size:14px; font-family:monospace; outline:none; margin-bottom:10px;"
      onfocus="this.style.borderColor='#1d4ed8'" onblur="this.style.borderColor='#d1d5db'">
    <div id="ghSetupError" style="color:#dc2626; font-size:12px; margin-bottom:10px; display:none;"></div>
    <button onclick="saveGhToken()"
      style="width:100%; background:#1d4ed8; color:white; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;">
      שמור וסנכרן
    </button>
    <button onclick="skipGhSetup()"
      style="width:100%; background:transparent; color:#6b7280; border:none; padding:10px; font-size:13px; cursor:pointer; font-family:inherit; margin-top:4px;">
      דלג (עבודה מקומית בלבד)
    </button>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="display:none; position:fixed; inset:0; background:linear-gradient(135deg,#14532d,#16a34a); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
  <div style="font-size:52px;">💰</div>
  <div style="color:white; font-size:26px; font-weight:700;">הכנסות והוצאות</div>
  <div style="background:white; border-radius:20px; padding:28px 32px; width:300px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="font-size:15px; color:#6b7280; margin-bottom:16px; font-weight:600;">הזיני קוד כניסה</div>
    <input id="pinInput" type="password" autocomplete="off" inputmode="numeric" maxlength="10"
      style="width:100%; border:2px solid #d1d5db; border-radius:12px; padding:14px; font-size:22px; text-align:center; letter-spacing:6px; font-family:inherit; outline:none;"
      placeholder="••••"
      onkeydown="if(event.key==='Enter') checkPin()"
      onfocus="this.style.borderColor='#16a34a'"
      onblur="this.style.borderColor='#d1d5db'">
    <div id="pinError" style="color:#dc2626; font-size:13px; margin-top:8px; display:none;">קוד שגוי, נסי שנית</div>
    <button onclick="checkPin()"
      style="margin-top:14px; width:100%; background:#16a34a; color:white; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit;">
      כניסה
    </button>
  </div>
  <div style="color:rgba(255,255,255,0.6); font-size:13px;">גישה מורשית בלבד</div>
</div>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <h1>💰 הכנסות והוצאות</h1>
      <div class="header-sub" id="headerSub">טוען...</div>
    </div>
    <div class="header-actions">
      <button class="btn-sync" onclick="mergeWithSheets()">🔀 מיזוג שיטס</button>
      <button class="btn-sync" id="btnSync" onclick="manualSync()">☁️ סנכרון</button>
      <button class="btn-sync" onclick="showGhSetup()" title="הגדרת טוקן" style="padding:9px 10px;">⚙️</button>
      <button class="btn-add-main" onclick="openModal()">+ הוספה</button>
    </div>
  </div>
</div>

<div class="summary">
  <div class="summary-card card-income">
    <div class="label">הכנסות</div>
    <div class="amount" id="totalIncome">₪0</div>
  </div>
  <div class="summary-card card-expense">
    <div class="label">הוצאות</div>
    <div class="amount" id="totalExpense">₪0</div>
  </div>
  <div class="summary-card card-bank" id="bankCard" onclick="startEditBank()">
    <div class="label">מצב בנק</div>
    <div class="amount" id="bankDisplay">₪0</div>
    <input type="number" id="bankBalance" placeholder="0" style="display:none; width:100%; border:none; text-align:center; font-size:20px; font-weight:700; color:#6366f1; font-family:inherit; outline:none; background:transparent;" oninput="updateSummary()" onblur="stopEditBank()">
    <div class="hint">לחצי לעריכה</div>
  </div>
  <div class="summary-card card-balance">
    <div class="label">יתרה כוללת</div>
    <div class="amount" id="totalBalance">₪0</div>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab income-tab active" onclick="setTab('income')">הכנסות</button>
    <button class="tab expense-tab" onclick="setTab('expense')">הוצאות</button>
    <button class="tab" onclick="setTab('all')" style="flex:0.7">הכל</button>
  </div>

  <div class="filter-bar">
    <select id="filterMonth" onchange="renderList()">
      <option value="">כל החודשים</option>
    </select>
    <input type="text" id="filterSearch" placeholder="חיפוש: שם / תאריך ביצוע / הערות..." oninput="renderList()">
    <select id="sortBy" onchange="renderList()">
      <option value="exec_asc" selected>תאריך ביצוע (ישן-חדש)</option>
      <option value="exec_desc">תאריך ביצוע (חדש-ישן)</option>
      <option value="name_asc">שם (א-ת)</option>
      <option value="name_desc">שם (ת-א)</option>
    </select>
  </div>
  <div id="filterTotal" style="display:none; background:white; border-radius:12px; padding:10px 16px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.07); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;">
    <span id="filterTotalLabel" style="font-size:13px; color:#6b7280; font-weight:600;"></span>
    <span id="filterTotalAmount" style="font-size:18px; font-weight:700;"></span>
  </div>
  <div class="selection-bar" id="selectionBar">
    <span class="sel-count" id="selectionCount"></span>
    <span class="sel-sum" id="selectionSum"></span>
    <button onclick="deleteSelected()" style="background:#dc2626; border-color:#dc2626;">מחק נבחרים 🗑️</button>
    <button onclick="clearSelection()">נקה בחירה ✕</button>
  </div>

  <div class="entries-header" id="entriesHeader" style="display:none;">
    <span></span><span>שם</span><span>ביצוע</span><span>פרעון</span><span>סה"כ</span>
  </div>
  <div class="entries" id="entriesList"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">הוספת רשומה</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>

    <div class="type-toggle">
      <button class="type-btn active-income" id="typeIncome" onclick="setType('income')">📥 הכנסה</button>
      <button class="type-btn" id="typeExpense" onclick="setType('expense')">📤 הוצאה</button>
    </div>

    <div class="form-group">
      <label class="form-label">שם / תיאור</label>
      <input type="text" class="form-input" id="fieldName" placeholder="שם הלקוח / הוצאה">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">ת. ביצוע</label>
        <input type="date" lang="he" class="form-input" id="fieldExecDate">
      </div>
      <div class="form-group">
        <label class="form-label">ת. פרעון (תשלום)</label>
        <input type="date" lang="he" class="form-input" id="fieldPayDate">
      </div>
    </div>

    <!-- הכנסות: שדה סכום רגיל -->
    <div class="form-group" id="amountSimple">
      <label class="form-label">סכום (₪)</label>

// ---- INIT ----
async function startApp() {
  loadFromStorage();
  if (entries.length === 0) {
    entries = JSON.parse(JSON.stringify(INITIAL_DATA));
    saveToStorage();
  }
  loadBankBalance();
  populateMonthFilter();
  renderList();
  updateSummary();
  updateHeaderSub();

  // טען מ-GitHub אם יש טוקן
  if (ghToken()) {
    showStatus('☁️ מסנכרן...', '');
    const remote = await githubLoad();
    if (remote && remote.entries && remote.savedAt) {
      const localTs = localStorage.getItem('finance_savedAt') || '';
      if (remote.savedAt > localTs) {
        entries = remote.entries;
        if (remote.bankBalance) {
          document.getElementById('bankBalance').value = remote.bankBalance;
          localStorage.setItem('bankBalance', remote.bankBalance);
        }
        localStorage.setItem('finance_entries', JSON.stringify(entries));
        localStorage.setItem('finance_savedAt', remote.savedAt);
        populateMonthFilter();
        renderList();
        updateSummary();
        showStatus('✅ מעודכן מהענן', 'success');
        return;
      }
    }
    showStatus('', '');
  }
}

function init() {
  if (sessionStorage.getItem('auth') === '1') {
    afterLogin();
  } else {
    const ls = document.getElementById('loginScreen');
    ls.style.display = 'flex';
    setTimeout(() => document.getElementById('pinInput').focus(), 100);
  }
}

function afterLogin() {
  // אם טוקן לא הוגדר עדיין — הצג מסך הגדרה
  if (localStorage.getItem('gh_token') === null) {
    document.getElementById('ghSetup').style.display = 'flex';
  } else {
    startApp();
  }
}

function loadFromStorage() {
  const saved = localStorage.getItem('finance_entries');
  if (saved) {
    try { entries = JSON.parse(saved); } catch(e) { entries = []; }
  }
}

function saveToStorage() {
  const now = new Date().toISOString();
  localStorage.setItem('finance_entries', JSON.stringify(entries));
  localStorage.setItem('finance_savedAt', now);
  scheduleGhSync();
}

function updateHeaderSub() {
  const now = new Date();
  document.getElementById('headerSub').textContent =
    now.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
}

// ---- TABS ----
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabs = { income: 0, expense: 1, all: 2 };
  document.querySelectorAll('.tab')[tabs[tab]].classList.add('active');
  renderList();
}

// ---- FILTER ----
function populateMonthFilter() {
  const months = new Set();
  entries.forEach(e => {
    if (e.execDate) months.add(e.execDate.substring(0, 7));
  });
  const sel = document.getElementById('filterMonth');
  const current = sel.value;
  sel.innerHTML = '<option value="">כל החודשים</option>';
  [...months].sort().reverse().forEach(m => {
    const [y, mo] = m.split('-');
    const label = new Date(y, mo - 1).toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
    sel.innerHTML += `<option value="${m}" ${m === current ? 'selected' : ''}>${label}</option>`;
  });
}

function getFilteredEntries() {
  const month = document.getElementById('filterMonth').value;
  const search = document.getElementById('filterSearch').value.toLowerCase().trim();
  return entries.filter(e => {
    if (currentTab !== 'all' && e.type !== currentTab) return false;
    if (search) {
      const name = e.name ? String(e.name).toLowerCase() : '';
      const notes = e.notes ? String(e.notes).toLowerCase() : '';
      const execRaw = e.execDate ? String(e.execDate).toLowerCase() : '';
      const execFormatted = e.execDate ? formatDate(e.execDate).toLowerCase() : '';
      const matches = name.includes(search) || notes.includes(search) || execRaw.includes(search) || execFormatted.includes(search);
      if (!matches) return false;
    }
    if (month && (!e.execDate || !e.execDate.startsWith(month))) return false;
    return true;
  });
}

function updateFilterTotal(filtered) {
  const month = document.getElementById('filterMonth').value;
  const search = document.getElementById('filterSearch').value.trim();
  const el = document.getElementById('filterTotal');
  const labelEl = document.getElementById('filterTotalLabel');
  const amountEl = document.getElementById('filterTotalAmount');

  if (!month && !search) { el.style.display = 'none'; return; }

  // בחיפוש לפי שם — מציגים רק את מה שנשאר לשלם/לקבל (לא נכלל מה ששולם), כדי לדעת מה עוד פתוח
  const total = search
    ? filtered.reduce((s, e) => s + (isFullyPaid(e.status) ? 0 : (Number(e.amount) || 0)), 0)
    : filtered.reduce((s, e) => s + effectiveAmount(e), 0);
  const count = filtered.length;

  let label = '';
  if (month) {
    const [y, mo] = month.split('-');
    const mName = new Date(y, mo - 1).toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
    label = `סה"כ ביצוע ${mName}`;
  } else {
    label = `נשאר לשלם "${search}"`;
  }
  if (search && month) label += ` + "${search}"`;
  label += ` (${count} רשומות)`;

  const isExpense = currentTab === 'expense';
  const isIncome  = currentTab === 'income';
  labelEl.textContent = label;
  amountEl.textContent = formatAmount(total);
  amountEl.style.color = isExpense ? '#dc2626' : isIncome ? '#16a34a' : '#111827';
  el.style.display = 'flex';
}

// ---- SELECTION ----
const selectedIds = new Set();
function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateSelectionBar();
}
function clearSelection() {
  selectedIds.clear();
  renderList();
}
function deleteSelected() {
  if (selectedIds.size === 0) return;
  if (!confirm(`למחוק ${selectedIds.size} רשומות נבחרות?`)) return;
  const idsToDelete = [...selectedIds];
  entries = entries.filter(e => !selectedIds.has(e.id));
  selectedIds.clear();
  saveToStorage();
  populateMonthFilter();
  renderList();
  updateSummary();
  showStatus(`✅ נמחקו ${idsToDelete.length} רשומות`, 'success');
  idsToDelete.forEach(id => deleteEntryFromSheets(id));
}
function updateSelectionBar() {
  const bar = document.getElementById('selectionBar');
  if (selectedIds.size === 0) { bar.classList.remove('show'); return; }
  const selected = entries.filter(e => selectedIds.has(e.id));
  const sum = selected.reduce((s, e) => s + effectiveAmount(e), 0);
  document.getElementById('selectionCount').textContent = `נבחרו ${selectedIds.size} שורות`;
  document.getElementById('selectionSum').textContent = formatAmount(sum);
  bar.classList.add('show');
}

// ---- RENDER ----
function renderList() {
  const list = document.getElementById('entriesList');
  const filtered = getFilteredEntries();
  updateFilterTotal(filtered);
  updateSelectionBar();

  if (filtered.length === 0) {
    document.getElementById('entriesHeader').style.display = 'none';
    list.innerHTML = `<div class="empty-state"><div class="icon">${currentTab === 'income' ? '📥' : currentTab === 'expense' ? '📤' : '📊'}</div><p>אין רשומות</p></div>`;
    return;
  }
  document.getElementById('entriesHeader').style.display = 'grid';

  // מיון
  const sortBy = document.getElementById('sortBy').value;
  let sorted;
  if (sortBy === 'name_asc') {
    sorted = [...filtered].sort((a, b) => (a.name||'').localeCompare(b.name||'', 'he'));
  } else if (sortBy === 'name_desc') {
    sorted = [...filtered].sort((a, b) => (b.name||'').localeCompare(a.name||'', 'he'));
  } else if (sortBy === 'exec_asc') {
    sorted = [...filtered].sort((a, b) => (a.execDate||'').localeCompare(b.execDate||''));
  } else if (sortBy === 'exec_desc') {
    sorted = [...filtered].sort((a, b) => (b.execDate||'').localeCompare(a.execDate||''));
  } else {
    // ברירת מחדל — הוצאות לפי פרעון מהישן לחדש; שאר לפי ביצוע מהחדש לישן
    sorted = [...filtered].sort((a, b) => {
      const da = (currentTab === 'expense' ? a.payDate || a.execDate : a.execDate || a.payDate) || '';
      const db = (currentTab === 'expense' ? b.payDate || b.execDate : b.execDate || b.payDate) || '';
      return currentTab === 'expense' ? da.localeCompare(db) : db.localeCompare(da);
    });
  }

  list.innerHTML = sorted.map(e => {
    const statusBadge = statusBadgeHtml(e.status);
    const execStr = e.execDate ? formatDate(e.execDate) : '';
    const payStr = e.payDate ? formatDate(e.payDate) : '';
    const paidStr = e.paidDate ? formatDate(e.paidDate) : '';
    const isExpense = e.type === 'expense';

    const quickEdit = isExpense ? `
      <div class="quick-edit" onclick="event.stopPropagation()">
        <select class="qe-select" onchange="quickSave('${e.id}','status',this.value)">
          ${statusOptions(e.status)}
        </select>
        <input type="date" lang="he" class="qe-date" value="${e.paidDate||''}" title="ת. ביצוע תשלום"
          onchange="quickSave('${e.id}','paidDate',this.value)">
      </div>` : '';

    return `<div class="entry-row ${e.type} ${isFullyPaid(e.status)?'is-paid':''}" onclick="openModal('${e.id}')">
      <div class="entry-main">
        <input type="checkbox" class="entry-check" ${selectedIds.has(e.id)?'checked':''} onclick="event.stopPropagation(); toggleSelect('${e.id}')">
        <div class="entry-name">${e.name||'(ללא שם)'}</div>
        <div class="entry-col-date">${execStr || '—'}</div>
        <div class="entry-col-date">${payStr || '—'}</div>
        <div class="entry-amount">${formatAmount(effectiveAmount(e))}</div>
      </div>
      <div class="entry-sub">
        ${statusBadge}
        ${paidStr ? `<span class="entry-notes">שולם: ${paidStr}</span>` : ''}
        ${e.notes ? `<span class="entry-notes">${e.notes}</span>` : ''}
        ${isExpense && e.subAmounts && e.subAmounts.length > 1 ? e.subAmounts.map(s => `<span class="sub-amt-chip">${s.note ? s.note + ': ' : ''}₪${Number(s.value).toLocaleString('he-IL')}</span>`).join('') : ''}
        ${quickEdit}
      </div>
    </div>`;
  }).join('');
}

function statusBadgeHtml(s) {
  const map = {
    paid:          '<span class="badge badge-paid">שולם ✅</span>',
    paid_bit:      '<span class="badge badge-paid">ביט 📱</span>',
    paid_paybox:   '<span class="badge badge-paid">פייבוקס 💜</span>',
    paid_transfer: '<span class="badge badge-paid">העברה 🏦</span>',
    partial:       '<span class="badge badge-partial">חלקי ⚠️</span>',
    unpaid:        '<span class="badge badge-unpaid">לא שולם ❌</span>',
  };
  return map[s] || map.unpaid;
}

function statusOptions(current) {
  const opts = [
    ['unpaid','לא שולם ❌'],
    ['paid','שולם ✅'],
    ['paid_bit','שולם בביט 📱'],
    ['paid_paybox','שולם בפייבוקס 💜'],
    ['paid_transfer','שולם בהעברה 🏦'],
    ['partial','שולם חלקית ⚠️'],
  ];
  return opts.map(([v,l]) => `<option value="${v}"${v===current?' selected':''}>${l}</option>`).join('');
}

function quickSave(id, field, value) {
  const idx = entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  entries[idx][field] = value;
  if (field === 'status' && isFullyPaid(value)) {
    const today = todayStr();
    entries[idx].paidDate = today;
    const now = new Date();
    const next15 = new Date(now.getFullYear(), now.getMonth() + 1, 15);
    entries[idx].payDate = next15.toISOString().split('T')[0];
  }
  saveToStorage();
  renderList();
  updateSummary();
  syncEntryToSheets(entries[idx]);
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function formatAmount(a) {
  if (!a && a !== 0) return '—';
  return '₪' + Number(a).toLocaleString('he-IL', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// ---- SUMMARY ----
function isFullyPaid(status) {
  return status === 'paid' || status === 'paid_bit' || status === 'paid_paybox' || status === 'paid_transfer';
}
function effectiveAmount(e) {
  // בהוצאות הסכום נשאר מוצג כרגיל גם אחרי "שולם" — נמחק רק כשמוחקים את השורה ידנית
  if (e.type === 'expense') return Number(e.amount) || 0;
  return isFullyPaid(e.status) ? 0 : (Number(e.amount) || 0);
}
function updateSummary() {
  const income = entries.filter(e => e.type === 'income').reduce((s, e) => s + effectiveAmount(e), 0);
  const expense = entries.filter(e => e.type === 'expense').reduce((s, e) => s + effectiveAmount(e), 0);
  document.getElementById('totalIncome').textContent = formatAmount(income);
  document.getElementById('totalExpense').textContent = formatAmount(expense);

  const bank = parseFloat(document.getElementById('bankBalance').value) || 0;
  const bankEl = document.getElementById('bankDisplay');
  bankEl.textContent = formatBankAmount(bank);
  bankEl.style.color = bank < 0 ? '#dc2626' : '#16a34a';

  const bal = bank + income - expense;
  document.getElementById('totalBalance').textContent = formatBankAmount(bal);
}

// ---- MULTI-AMOUNT ----
function addAmountRow(value = '', note = '') {
  const list = document.getElementById('amountsList');
  const div = document.createElement('div');
  div.className = 'amount-row';
  div.innerHTML = `
    <input type="number" placeholder="סכום ₪" min="0" step="0.01" value="${value}"
      oninput="updateAmountsTotal()" class="amount-inp">
    <input type="text" placeholder="תיאור (אופציונלי)" value="${note}" class="note-inp">
    <button type="button" class="btn-remove-amt" onclick="removeAmountRow(this)">✕</button>`;
  list.appendChild(div);
  updateAmountsTotal();
  div.querySelector('.amount-inp').focus();
}

function removeAmountRow(btn) {
  btn.closest('.amount-row').remove();
  updateAmountsTotal();
}

function updateAmountsTotal() {
  const total = getSubAmounts().reduce((s, a) => s + a.value, 0);
  document.getElementById('amountsTotal').textContent =
    'סה"כ: ₪' + total.toLocaleString('he-IL');
}

function getSubAmounts() {
  return [...document.querySelectorAll('#amountsList .amount-row')].map(row => ({
    value: parseFloat(row.querySelector('.amount-inp').value) || 0,
    note:  row.querySelector('.note-inp').value.trim(),
  })).filter(a => a.value > 0 || a.note);
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

// ---- SAVE / DELETE ----
function saveEntry() {
  const name = document.getElementById('fieldName').value.trim();
  if (!name) { alert('נא להזין שם'); return; }

  let amount, subAmounts;
  if (editingType === 'expense') {
    subAmounts = getSubAmounts();
    amount = subAmounts.reduce((s, a) => s + a.value, 0);
  } else {
    amount = parseFloat(document.getElementById('fieldAmount').value) || 0;
    subAmounts = [];
  }

  const entry = {
    id: editingId || Date.now().toString(),
    type: editingType,
    name,
    execDate: document.getElementById('fieldExecDate').value,
    payDate: document.getElementById('fieldPayDate').value,
    amount,
    subAmounts,
    status: document.getElementById('fieldStatus').value,
    paidDate: document.getElementById('fieldPaidDate').value,
    notes: document.getElementById('fieldNotes').value.trim(),
  };

  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx !== -1) entries[idx] = entry;
  } else {
    entries.push(entry);
  }

  saveToStorage();
  populateMonthFilter();
  renderList();
  updateSummary();
  closeModal();
  showStatus('נשמר ✓', 'success');
  syncEntryToSheets(entry).then(ok => { if (ok) showStatus('✅ נשמר לשיטס', 'success'); });
}

function deleteEntry() {
  if (!editingId) return;
  if (!confirm('למחוק את הרשומה?')) return;
  const deletedId = editingId;
  entries = entries.filter(e => e.id !== deletedId);
  saveToStorage();
  populateMonthFilter();
  renderList();
  updateSummary();
  closeModal();
  showStatus('נמחק', 'success');
  deleteEntryFromSheets(deletedId);
}

// ---- LOAD FROM SHEETS ----
async function loadFromSheets(silent) {
  if (!SHEETS_SCRIPT_URL) return;
  if (!silent && entries.length > 0) {
    if (!confirm('טעינה מהשיטס תחליף את כל הנתונים המקומיים.\nהאם להמשיך?')) return;
  }
  showStatus('🔄 טוען מגוגל שיטס...', '');

    const url = SHEETS_SCRIPT_URL + '?key=' + encodeURIComponent(SECRET_KEY);

// ---- SYNC TO SHEETS ----

// שמירת רשומה אחת לשיטס (URL קצר — לא נכשל)
async function syncEntryToSheets(entry) {
  if (!SHEETS_SCRIPT_URL) return true;
  try {
    const url = SHEETS_SCRIPT_URL
      + '?action=upsert'
      + '&key=' + encodeURIComponent(SECRET_KEY)
      + '&entry=' + encodeURIComponent(JSON.stringify(entry));
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'שגיאה');
    return true;
  } catch(err) {
    showStatus('❌ שיטס: ' + err.message, 'error');
    return false;
  }
}

// מחיקת רשומה מהשיטס
async function deleteEntryFromSheets(id) {
  if (!SHEETS_SCRIPT_URL) return;
  try {
    const url = SHEETS_SCRIPT_URL
      + '?action=delete'
      + '&key=' + encodeURIComponent(SECRET_KEY)
      + '&id=' + encodeURIComponent(id);
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'שגיאה');
  } catch(err) {
    showStatus('❌ שיטס: ' + err.message, 'error');
  }
}

// שמירת כל הרשומות לשיטס (כפתור ידני)
async function syncToSheets(silent) {
  if (!SHEETS_SCRIPT_URL) return;
  if (!silent) showStatus('🔄 שומר לשיטס...', '');
  let ok = 0;
  for (const entry of entries) {
    const success = await syncEntryToSheets(entry);
    if (success) ok++;
  }
  if (!silent || ok < entries.length) {
    showStatus(ok === entries.length
      ? '✅ נשמרו ' + ok + ' רשומות לשיטס'
      : '⚠️ נשמרו ' + ok + ' מתוך ' + entries.length, ok === entries.length ? 'success' : 'error');
  }
}

function showStatus(msg, type) {

  el.textContent = msg;
  el.className = 'sync-status show ' + type;
  clearTimeout(el._timer);
  const duration = type === 'error' ? 10000 : 3000; // שגיאות — 10 שניות

// ---- PUSH ALL TO SHEETS ----
async function pushToSheets() {
  if (!SHEETS_SCRIPT_URL) return;
  showStatus('📤 שומר לשיטס...', '');
  let ok = 0;
  for (const entry of entries) {
    try {
      const url = SHEETS_SCRIPT_URL
        + '?action=upsert'
        + '&key=' + encodeURIComponent(SECRET_KEY)
        + '&entry=' + encodeURIComponent(JSON.stringify(entry));
      const r = await fetch(url);
      if (r.ok) ok++;
    } catch {}
  }
  showStatus(ok === entries.length
    ? '✅ נשמר לשיטס (' + ok + ' רשומות)'
    : '⚠️ נשמרו ' + ok + ' מתוך ' + entries.length, ok === entries.length ? 'success' : 'error');
}

// ---- MERGE WITH SHEETS ----
async function mergeWithSheets() {
  if (!SHEETS_SCRIPT_URL) return;
  showStatus('🔀 קורא מהשיטס...', '');
  try {
    const url = SHEETS_SCRIPT_URL + '?action=read_sheet&key=' + encodeURIComponent(SECRET_KEY);
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'שגיאה');

    const sheetsEntries = json.data || [];
    if (sheetsEntries.length === 0) {
      showStatus('השיטס ריק — אין מה למזג', '');
      return;
    }

    const merged = [...entries];
    let added = 0, updated = 0;
    const claimedIds = new Set(); // מונע שמספר שורות שונות בשיטס "ייבלעו" לתוך אותה רשומה באפליקציה

    for (const se of sheetsEntries) {
      if (!se.name) continue;
      // התאמה לפי ID (אם קיים בשתי הרשומות) — אמין; אחרת לפי סוג+שם+ת.ביצוע (רשומות ישנות בלי ID),
      // ורק אם הרשומה הזו עדיין לא "נתפסה" ע"י שורה אחרת מהשיטס באותו מיזוג
      const matchedById = !!se.id && merged.findIndex(le => le.id === se.id) >= 0;
      let matchIdx = se.id ? merged.findIndex(le => le.id === se.id) : -1;
      if (matchIdx < 0) {
        matchIdx = merged.findIndex(le =>
          le.type === se.type &&
          le.name.trim() === se.name.trim() &&
          (le.execDate || '') === (se.execDate || '') &&
          !claimedIds.has(le.id)
        );
      }
      if (matchIdx >= 0) {
        claimedIds.add(merged[matchIdx].id);
        // קיים בשניהם — האפליקציה גוברת (מונע דריסת עדכונים טריים ע"י נתונים ישנים מהשיטס)
        // משלימים מהשיטס רק שדות שריקים באפליקציה
        // את השם מעדכנים מהשיטס כשההתאמה היא לפי ID (אמינה) — כך שינוי שם שאודי עשה בשיטס ישתקף
        const le = merged[matchIdx];
        merged[matchIdx] = {
          ...le,
          name:     matchedById ? (se.name || le.name) : le.name,
          payDate:  le.payDate  || se.payDate,
          amount:   le.amount   || se.amount,
          notes:    le.notes    || se.notes,
          paidDate: le.paidDate || se.paidDate,
        };
        updated++;
      } else {
        // חדש — אודי הוסיף בשיטס; שומרים את ה-ID שהשיטס נתן לו כדי שמיזוגים עתידיים יתאימו נכון
        merged.push({ ...se, id: se.id || (Date.now().toString() + Math.random().toString(36).slice(2)) });
        added++;
      }
    }

    // מחיקות — שורות שאודי מחק בשיטס נמחקות גם באפליקציה
    // (בטוח לעשות זאת כי כל שינוי באפליקציה נשלח אוטומטית לשיטס, אז מזהה שלא מופיע בשיטס = נמחק שם)
    let deleted = 0;
    ['income', 'expense'].forEach(type => {
      const sheetIdsForType = new Set(sheetsEntries.filter(se => se.type === type && se.id).map(se => se.id));
      if (sheetIdsForType.size === 0) return; // הגנה — לא למחוק אם לא התקבלו נתונים לסוג הזה
      for (let i = merged.length - 1; i >= 0; i--) {
        if (merged[i].type === type && merged[i].id && !sheetIdsForType.has(merged[i].id)) {
          merged.splice(i, 1);
          deleted++;
        }
      }
    });

    entries = merged;
    saveToStorage();
    populateMonthFilter();
    renderList();
    updateSummary();

    // שמור את המיזוג חזרה לשיטס ול-GitHub
    scheduleGhSync();

    showStatus(`✅ מוזג: ${added} חדשות, ${updated} עודכנו, ${deleted} נמחקו`, 'success');
  } catch(err) {
    showStatus('❌ מיזוג: ' + err.message, 'error');
  }
}

// ---- GITHUB SYNC ----
const GH_REPO = 'Nunah31/income-expense-tracker-data';
const GH_FILE = 'finance-data.json';

function ghToken() { return localStorage.getItem('gh_token'); }

function saveGhToken() {
  const val = document.getElementById('ghTokenInput').value.trim();
  if (!val.startsWith('ghp_') && !val.startsWith('github_pat_')) {
    const err = document.getElementById('ghSetupError');
    err.textContent = 'טוקן לא תקין — חייב להתחיל ב-ghp_';
    err.style.display = 'block';
    return;
  }
  localStorage.setItem('gh_token', val);
  document.getElementById('ghTokenInput').value = '';
  document.getElementById('ghSetup').style.display = 'none';
  startApp();
}

function skipGhSetup() {
  localStorage.setItem('gh_token', '');
  document.getElementById('ghSetup').style.display = 'none';
  startApp();
}

async function githubLoad() {
  const token = ghToken();
  if (!token) return null;
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) return null;
    const f = await r.json();
    const text = decodeURIComponent(escape(atob(f.content.replace(/\n/g, ''))));
    return JSON.parse(text);
  } catch { return null; }
}

async function githubSave() {
  const token = ghToken();
  if (!token) return false;
  try {
    const payload = JSON.stringify({
      entries,
      bankBalance: document.getElementById('bankBalance').value || '',
      savedAt: new Date().toISOString(),
    });
    const content = btoa(unescape(encodeURIComponent(payload)));

    // קבל SHA נוכחי
    let sha;
    const getR = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (getR.ok) { const f = await getR.json(); sha = f.sha; }

    const body = { message: 'sync', content };
    if (sha) body.sha = sha;

    const putR = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json',
      },
      body: JSON.stringify(body),
    });
    return putR.ok;
  } catch { return false; }
}

let ghSyncTimer = null;
function scheduleGhSync() {
  clearTimeout(ghSyncTimer);
  ghSyncTimer = setTimeout(async () => {
    const ok = await githubSave();
    if (ok) showStatus('☁️ סונכרן', 'success');
  }, 3000);
}

async function manualSync() {
  if (!ghToken()) {
    showGhSetup();
    return;
  }
  showStatus('☁️ מסנכרן...', '');
  // טען מ-GitHub קודם
  const remote = await githubLoad();
  if (remote && remote.savedAt) {
    const localTs = localStorage.getItem('finance_savedAt') || '';
    if (remote.savedAt > localTs) {
      if (confirm('יש גרסה חדשה יותר מהענן. לטעון אותה?')) {
        entries = remote.entries;
        if (remote.bankBalance) document.getElementById('bankBalance').value = remote.bankBalance;
        saveToStorage();
        populateMonthFilter(); renderList(); updateSummary();
        showStatus('✅ נטען מהענן', 'success');
        return;
      }
    }
  }
  const ok = await githubSave();
  showStatus(ok ? '✅ נשמר בענן' : '❌ שגיאת סנכרון', ok ? 'success' : 'error');
}

function showGhSetup() {
  const s = document.getElementById('ghSetup');
  s.style.display = 'flex';
}

// ---- SERVICE WORKER ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update(); // בדוק עדכון בכל טעינה
  }).catch(() => {});
}

// ---- START ----
init();
</script>
</body>
</html>
